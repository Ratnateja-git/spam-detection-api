<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spam Guard | AI Threat Scanner</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<div class="hacker-bg"></div>
<canvas id="matrix"></canvas>

<div class="main-container">
  <div class="hacker-card">

    <div class="terminal-bar">
      <div class="controls"><span></span><span></span><span></span></div>
      <div class="status-indicator">SECURE_CONNECTION: ACTIVE</div>
    </div>

    <div class="card-body">

      <h1 class="glitch">AI SPAM GUARD</h1>
      <p class="subtitle">Real-time threat detection engine...</p>

      <textarea id="msg" placeholder="Enter message..."></textarea>

      <button onclick="check()" id="scanBtn">
        <span id="btn-txt">SCAN MESSAGE</span>
      </button>

    </div>
  </div>
</div>

<!-- MODAL -->
<div id="alertModal" class="modal-overlay hidden">
  <div class="modal-window">
    <i id="modal-icon" class="fa-solid"></i>

    <h2 id="modal-status">SCANNING...</h2>
    <p id="modal-msg"></p>

    <div class="stat-container">
      <div class="stat-box">
        <label>THREAT LEVEL</label>
        <span id="threat-lvl">--</span>
      </div>

      <div class="stat-box">
        <label>CONFIDENCE</label>
        <span id="modal-conf">--</span>
      </div>
    </div>

    <button onclick="closeModal()" class="dismiss-btn">CLOSE</button>
  </div>
</div>

<script>
const samples = [
  "Win ₹5000 now click link",
  "Hi, are we meeting today?",
  "Your account is blocked, click now",
  "Let's catch up later"
];

let i = 0;
setInterval(() => {
  document.getElementById("msg").placeholder = samples[i];
  i = (i + 1) % samples.length;
}, 3000);

// ENTER key support
document.getElementById("msg").addEventListener("keypress", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    check();
  }
});

async function check() {
  const msg = document.getElementById("msg").value.trim();
  if (!msg) return alert("Enter a message");

  showModal("loading");

  try {
    const res = await fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: msg})
    });

    const data = await res.json();
    showModal(data.prediction, data.confidence);

  } catch {
    showModal("error");
  }
}

function showModal(prediction, confidence=null) {
  const modal = document.getElementById("alertModal");
  const win = document.querySelector(".modal-window");

  const status = document.getElementById("modal-status");
  const msgDesc = document.getElementById("modal-msg");
  const confText = document.getElementById("modal-conf");
  const threatLvl = document.getElementById("threat-lvl");
  const icon = document.getElementById("modal-icon");

  modal.classList.remove("hidden");

  // LOADING
  if (prediction === "loading") {
    win.className = "modal-window";
    status.innerText = "SCANNING...";
    msgDesc.innerText = "Analyzing message...";
    confText.innerText = "--";
    threatLvl.innerText = "...";
    return;
  }

  // ERROR
  if (prediction === "error") {
    win.className = "modal-window";
    status.innerText = "SYSTEM ERROR";
    msgDesc.innerText = "Connection failed. Try again.";
    confText.innerText = "--";
    threatLvl.innerText = "UNKNOWN";
    return;
  }

  // Confidence safe handling
  if (confidence && !isNaN(confidence)) {
    confText.innerText = (confidence * 100).toFixed(1) + "%";
  } else {
    confText.innerText = "N/A";
  }

  const isSpam = prediction === "spam";

  if (isSpam) {
    win.className = "modal-window threat";
    status.innerText = "THREAT DETECTED";
    msgDesc.innerText = "Spam or phishing content identified.";
    threatLvl.innerText = "HIGH";
    icon.className = "fa-solid fa-triangle-exclamation";
  } else {
    win.className = "modal-window safe";
    status.innerText = "SAFE MESSAGE";
    msgDesc.innerText = "No spam detected.";
    threatLvl.innerText = "LOW";
    icon.className = "fa-solid fa-shield";
  }
}

function closeModal() {
  document.getElementById("alertModal").classList.add("hidden");
}
</script>

</body>
</html>
